[project]
name = "synapse-p2p"
version = "0.1.4"
description = "A rapid RPC framework for building p2p networks"
authors = [{ name = "Daniel van Flymen", email = "vanflymen@gmail.com" }]
requires-python = ">=3.7"
dependencies = [
    "loguru",
    "msgpack",
]

[project.urls]
Homepage = "https://github.com/dvf/synapse"

[dependency-groups]
dev = [
    "faker",
    "pytest",
    "pytest-sugar",
    "pytest-cov",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["synapse_p2p"]
